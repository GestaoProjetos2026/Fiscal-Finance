<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Fiscal Finance</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <div class="login-header">
      <div class="login-logo">💼</div>
      <h1 class="login-title">Fiscal Finance</h1>
      <p class="login-sub">Squad FISC — Sistema de Gestão Fiscal</p>
    </div>

    <form id="form-login">
      <div class="form-group">
        <label class="form-label" for="input-email">E-mail</label>
        <input
          id="input-email"
          type="email"
          class="form-control"
          placeholder="admin@fiscal.com"
          autocomplete="username"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="input-senha">Senha</label>
        <input
          id="input-senha"
          type="password"
          class="form-control"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <div id="login-error" class="hidden" style="
        background:var(--danger-bg);
        border:1px solid #fca5a5;
        color:#b91c1c;
        border-radius:6px;
        padding:10px 14px;
        font-size:13px;
        margin-bottom:14px;
      "></div>

      <button id="btn-login" type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">
        Entrar
      </button>
    </form>

    <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--text-light);">
      Padrão: admin@fiscal.com / admin123
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/ui.js"></script>
<script>
  // Redireciona se já estiver logado
  if (getToken()) {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    errEl.classList.add('hidden');

    const email = document.getElementById('input-email').value.trim();
    const senha = document.getElementById('input-senha').value;

    setLoading(btn, true);

    const res = await API.Auth.login(email, senha);
    setLoading(btn, false);

    if (res.ok) {
      setToken(res.body.data.token);
      setUser({ nome: res.body.data.nome, papel: res.body.data.papel });
      toast('Login realizado com sucesso!', 'success');
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
    } else {
      errEl.textContent = res.body.message || 'Credenciais inválidas.';
      errEl.classList.remove('hidden');
    }
  });
</script>

</body>
</html>
