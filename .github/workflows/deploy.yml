name: Deploy Squad

on:
  push:
    branches: [ "main", "staging" ]

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fiscal-finance:latest

      # Deploy Remoto na VM do Professor via SSH
      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fiscal-finance:latest
            docker stop container-fisc || true
            docker rm container-fisc || true
            docker run -d --name container-fisc -p 8080:5000 ${{ secrets.DOCKERHUB_USERNAME }}/fiscal-finance:latest
